springdoc:
  swagger-ui.path: /openapi/swagger-ui.html
  api-docs.path: /openapi/v3/api-docs
  packagesToScan: es.flores.microservices.composite.screen
  pathsToMatch: /**

api:
  common:
    version: 1.0.0
    title: Sample API
    description: Description of the API...
    termsOfService: MY TERMS OF SERVICE
    license: MY LICENSE
    licenseUrl: MY LICENSE URL

    externalDocDesc: MY WIKI PAGE
    externalDocUrl: MY WIKI URL
    contact:
      name: NAME OF CONTACT
      url: URL TO CONTACT
      email: contact@mail.com

  responseCodes:
    ok.description: OK
    badRequest.description: Bad Request, invalid format of the request. See response message for more information
    notFound.description: Not found, the specified id does not exist
    unprocessableEntity.description: Unprocessable entity, input parameters caused the processing to fail. See response message for more information

  screen-composite:

    get-composite-screen:
      description: Returns a composite view of the specified screen id
      notes: |
        # Normal response
        If the requested screen id is found the method will return information regarding:
        1. Screen information
        1. Explanations
        1. Components
        1. Service Addresses\n(technical information regarding the addresses of the microservices that created the response)

        # Expected partial and error responses
        1. If no screen information is found, a **404 - Not Found** error will be returned
        1. In no components or explanations are found for a screen, a partial response will be returned

    create-composite-screen:
      description: Creates a composite screen
      notes: |
        # Normal response
        The composite screen information posted to the API will be split up and stored as separate screen-info, component and explanation entities.

        # Expected error responses
        1. If a screen with the same screenId as specified in the posted information already exists,
           an **422 - Unprocessable Entity** error with a "duplicate key" error message will be returned

    delete-composite-screen:
      description: Deletes a screen composite
      notes: |
        # Normal response
        Entities for screen information, components and explanations related to the specified screenId will be deleted.
        The implementation of the delete method is idempotent, i.e. it can be called several times with the same response.

        This means that a delete request of a non-existing screen will return **200 Ok**.

server.port: 7001
server.error.include-message: always

app:
  screen-service:
    host: localhost
    port: 7002
  component-service:
    host: localhost
    port: 7003
  explanation-service:
    host: localhost
    port: 7004

spring.cloud.stream:
  defaultBinder: rabbit
  default.contentType: application/json
  bindings:
    screens-out-0:
      destination: screens
      producer:
        required-groups: auditGroup
    components-out-0:
      destination: components
      producer:
        required-groups: auditGroup
    explanations-out-0:
      destination: explanations
      producer:
        required-groups: auditGroup

spring.rabbitmq:
  host: 127.0.0.1
  port: 5672
  username: guest
  password: guest

logging:
  level:
    root: INFO
    es.flores: INFO

management.endpoint.health.show-details: "ALWAYS"
management.endpoints.web.exposure.include: "*"
---
spring.config.activate.on-profile: docker

server.port: 8080

app:
  screen-service:
    host: screen
    port: 8080
  component-service:
    host: component
    port: 8080
  explanation-service:
    host: explanation
    port: 8080

spring.rabbitmq.host: rabbitmq

---
spring.config.activate.on-profile: streaming_partitioned

spring.cloud.stream.bindings.screens-out-0.producer:
  partition-key-expression: headers['partitionKey']
  partition-count: 2

spring.cloud.stream.bindings.components-out-0.producer:
  partition-key-expression: headers['partitionKey']
  partition-count: 2

spring.cloud.stream.bindings.explanations-out-0.producer:
  partition-key-expression: headers['partitionKey']
  partition-count: 2

---

management.health.rabbit.enabled: false